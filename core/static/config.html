<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Identity 管理</title>
    <style>
      :root {
        --bg: #0f0f12;
        --surface: #18181c;
        --surface-hover: #1e1e24;
        --border: #2a2a30;
        --text: #e4e4e7;
        --text-muted: #71717a;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --danger: #ef4444;
        --danger-hover: #dc2626;
        --success: #22c55e;
        --warning: #f59e0b;
        --radius: 10px;
      }
      * { box-sizing: border-box; margin: 0; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: var(--bg); color: var(--text);
        padding: 24px; line-height: 1.5;
      }
      h1 { font-size: 1.5rem; margin-bottom: 24px; }

      /* toolbar */
      .toolbar {
        display: flex; align-items: center; gap: 12px;
        margin-bottom: 20px; flex-wrap: wrap;
      }
      .btn {
        padding: 8px 16px; border-radius: 8px; border: none;
        cursor: pointer; font-size: 14px; font-weight: 500;
        transition: background .15s;
      }
      .btn-primary { background: var(--accent); color: #fff; }
      .btn-primary:hover { background: var(--accent-hover); }
      .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
      .btn-secondary:hover { background: var(--surface-hover); }
      .btn-danger { background: var(--danger); color: #fff; }
      .btn-danger:hover { background: var(--danger-hover); }
      .btn-sm { padding: 5px 12px; font-size: 13px; }
      .btn:disabled { opacity: .5; cursor: not-allowed; }

      /* upload zone */
      .upload-zone {
        border: 2px dashed var(--border); border-radius: var(--radius);
        padding: 32px; text-align: center; cursor: pointer;
        transition: border-color .2s, background .2s;
        margin-bottom: 24px; position: relative;
      }
      .upload-zone:hover, .upload-zone.dragover {
        border-color: var(--accent); background: rgba(59,130,246,.06);
      }
      .upload-zone input[type="file"] {
        position: absolute; inset: 0; opacity: 0; cursor: pointer;
      }
      .upload-zone .icon { font-size: 2rem; margin-bottom: 8px; color: var(--text-muted); }
      .upload-zone .label { font-size: 15px; color: var(--text-muted); }
      .upload-zone .label strong { color: var(--accent); }

      /* identity cards */
      .identity-list { display: flex; flex-direction: column; gap: 12px; }
      .identity-card {
        background: var(--surface); border: 1px solid var(--border);
        border-radius: var(--radius); padding: 16px 20px;
        display: flex; align-items: flex-start; gap: 16px;
        transition: border-color .15s;
      }
      .identity-card:hover { border-color: #3a3a42; }
      .identity-card.disabled { opacity: .5; }
      .identity-info { flex: 1; min-width: 0; }
      .identity-header {
        display: flex; align-items: center; gap: 10px;
        margin-bottom: 6px; flex-wrap: wrap;
      }
      .fingerprint-id {
        font-size: 16px; font-weight: 600;
        font-family: ui-monospace, monospace;
      }
      .type-tag {
        display: inline-block; padding: 2px 8px;
        border-radius: 4px; font-size: 12px; font-weight: 500;
        background: rgba(59,130,246,.15); color: var(--accent);
      }
      .identity-meta {
        font-size: 13px; color: var(--text-muted);
        display: flex; gap: 16px; flex-wrap: wrap; margin-top: 4px;
      }
      .identity-actions {
        display: flex; gap: 8px; align-items: center; flex-shrink: 0;
      }
      .status-dot {
        display: inline-block; width: 8px; height: 8px;
        border-radius: 50%; margin-right: 4px; vertical-align: middle;
      }
      .status-dot.active { background: var(--success); }
      .status-dot.idle { background: var(--text-muted); }
      .status-dot.frozen { background: var(--warning); }
      .frozen-time {
        font-size: 11px; color: var(--warning);
        margin-left: 2px; font-weight: 400;
        font-family: ui-monospace, monospace;
      }

      /* toggle */
      .toggle {
        position: relative; width: 40px; height: 22px;
        background: var(--border); border-radius: 11px;
        cursor: pointer; transition: background .2s; flex-shrink: 0;
      }
      .toggle.on { background: var(--accent); }
      .toggle::after {
        content: ''; position: absolute; top: 2px; left: 2px;
        width: 18px; height: 18px; border-radius: 50%;
        background: #fff; transition: transform .2s;
      }
      .toggle.on::after { transform: translateX(18px); }

      /* toast */
      .toast {
        position: fixed; bottom: 24px; right: 24px;
        padding: 12px 20px; border-radius: 8px;
        font-size: 14px; z-index: 999;
        opacity: 0; transform: translateY(8px);
        transition: opacity .3s, transform .3s;
        pointer-events: none;
      }
      .toast.show { opacity: 1; transform: translateY(0); }
      .toast.success { background: var(--success); color: #fff; }
      .toast.error { background: var(--danger); color: #fff; }

      /* empty state */
      .empty-state {
        text-align: center; padding: 48px 24px;
        color: var(--text-muted); font-size: 15px;
      }

      /* spinner */
      .spinner {
        display: inline-block; width: 16px; height: 16px;
        border: 2px solid rgba(255,255,255,.3);
        border-top-color: #fff; border-radius: 50%;
        animation: spin .6s linear infinite; margin-right: 6px;
        vertical-align: middle;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <h1>Identity 管理</h1>

    <div class="upload-zone" id="uploadZone">
      <input type="file" accept=".zip" id="fileInput" />
      <div class="icon">&#x1F4E6;</div>
      <div class="label">拖拽 identity zip 文件到此处，或 <strong>点击选择</strong></div>
    </div>

    <div class="toolbar">
      <button class="btn btn-secondary" id="scanBtn">扫描目录</button>
      <button class="btn btn-secondary" id="refreshBtn">刷新</button>
      <span id="uploadStatus" style="font-size:13px;color:var(--text-muted)"></span>
    </div>

    <div id="identityList" class="identity-list">
      <div class="empty-state">加载中...</div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const $ = s => document.querySelector(s);
      const API = {
        list: () => fetch('/api/identities').then(r => r.json()),
        upload: f => {
          const fd = new FormData();
          fd.append('file', f);
          return fetch('/api/identities/upload', { method: 'POST', body: fd }).then(r => r.json().then(d => ({ ok: r.ok, data: d })));
        },
        del: id => fetch(`/api/identities/${id}`, { method: 'DELETE' }).then(r => r.json()),
        patch: (id, body) => fetch(`/api/identities/${id}`, {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        }).then(r => r.json()),
        scan: () => fetch('/api/identities/scan', { method: 'POST' }).then(r => r.json()),
      };

      function toast(msg, type = 'success') {
        const el = $('#toast');
        el.textContent = msg;
        el.className = 'toast ' + type + ' show';
        clearTimeout(el._t);
        el._t = setTimeout(() => el.classList.remove('show'), 3000);
      }

      function formatFrozenUntil(frozenUntil, now) {
        if (!frozenUntil || frozenUntil <= now) return '';
        const remaining = frozenUntil - now;
        if (remaining <= 0) return '';
        const h = Math.floor(remaining / 3600);
        const m = Math.floor((remaining % 3600) / 60);
        const s = remaining % 60;
        let parts = [];
        if (h > 0) parts.push(h + 'h');
        if (m > 0) parts.push(m + 'm');
        if (h === 0) parts.push(s + 's');
        return parts.join('');
      }

      function renderIdentities(data) {
        const list = $('#identityList');
        const identities = data.identities || [];
        const now = data.now || Math.floor(Date.now() / 1000);
        if (!identities.length) {
          list.innerHTML = '<div class="empty-state">暂无 identity，请上传 zip 文件或点击"扫描目录"</div>';
          return;
        }
        list.innerHTML = identities.map(i => {
          const typeTags = i.types.map(t => {
            const st = (i.type_statuses || {})[t] || {};
            let dotClass = 'idle';
            if (st.tab_state === 'frozen') dotClass = 'frozen';
            else if (st.is_active) dotClass = 'active';
            const frozenLabel = formatFrozenUntil(st.frozen_until, now);
            const frozenHtml = frozenLabel ? `<span class="frozen-time">${frozenLabel}</span>` : '';
            return `<span class="type-tag"><span class="status-dot ${dotClass}"></span>${esc(t)}${frozenHtml}</span>`;
          }).join(' ');
          return `
            <div class="identity-card ${i.enabled ? '' : 'disabled'}" data-id="${esc(i.fingerprint_id)}">
              <div class="identity-info">
                <div class="identity-header">
                  <span class="fingerprint-id">${esc(i.fingerprint_id)}</span>
                  ${typeTags}
                </div>
                <div class="identity-meta">
                  <span>${esc(i.timezone)}</span>
                  <span>${esc(i.proxy_url)}</span>
                </div>
              </div>
              <div class="identity-actions">
                <div class="toggle ${i.enabled ? 'on' : ''}"
                     onclick="toggleEnabled('${esc(i.fingerprint_id)}', ${!i.enabled})"
                     title="${i.enabled ? '点击禁用' : '点击启用'}"></div>
                <button class="btn btn-danger btn-sm"
                        onclick="deleteIdentity('${esc(i.fingerprint_id)}')">删除</button>
              </div>
            </div>`;
        }).join('');
      }

      function esc(s) {
        if (s == null) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
      }

      async function loadList() {
        try {
          const data = await API.list();
          renderIdentities(data);
        } catch (e) {
          toast('加载失败: ' + e.message, 'error');
        }
      }

      async function handleUpload(file) {
        if (!file || !file.name.toLowerCase().endsWith('.zip')) {
          toast('请选择 .zip 文件', 'error');
          return;
        }
        const status = $('#uploadStatus');
        status.innerHTML = '<span class="spinner"></span>上传中...';
        try {
          const { ok, data } = await API.upload(file);
          if (ok) {
            toast(`已安装 ${data.fingerprint_id}，支持: ${data.types.join(', ')}`);
            await loadList();
          } else {
            toast(data.detail || '上传失败', 'error');
          }
        } catch (e) {
          toast('上传失败: ' + e.message, 'error');
        }
        status.textContent = '';
      }

      async function deleteIdentity(id) {
        if (!confirm(`确认删除 identity ${id}？`)) return;
        try {
          await API.del(id);
          toast('已删除');
          await loadList();
        } catch (e) {
          toast('删除失败: ' + e.message, 'error');
        }
      }

      async function toggleEnabled(id, enabled) {
        try {
          await API.patch(id, { enabled });
          await loadList();
        } catch (e) {
          toast('操作失败: ' + e.message, 'error');
        }
      }

      // upload zone
      const zone = $('#uploadZone');
      const fileInput = $('#fileInput');
      zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
      zone.addEventListener('drop', e => {
        e.preventDefault(); zone.classList.remove('dragover');
        const f = e.dataTransfer.files[0];
        if (f) handleUpload(f);
      });
      fileInput.addEventListener('change', () => {
        const f = fileInput.files[0];
        if (f) handleUpload(f);
        fileInput.value = '';
      });

      // scan
      $('#scanBtn').addEventListener('click', async () => {
        const btn = $('#scanBtn');
        btn.disabled = true; btn.textContent = '扫描中...';
        try {
          const data = await API.scan();
          if (data.registered && data.registered.length) {
            toast(`发现并注册 ${data.registered.length} 个 identity`);
          } else {
            toast('未发现新的 identity');
          }
          await loadList();
        } catch (e) {
          toast('扫描失败: ' + e.message, 'error');
        }
        btn.disabled = false; btn.textContent = '扫描目录';
      });

      // refresh
      $('#refreshBtn').addEventListener('click', loadList);

      // init
      loadList();
    </script>
  </body>
</html>
